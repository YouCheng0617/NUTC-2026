<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>心情漂流瓶 - 論壇</title>
    <link rel="stylesheet" href="test.css" />
  </head>
  <body>
    <div id="forum-view">
      <header class="light-header">
       <div class="logo" onclick="window.location.href='test.html'" title="回到主頁">
          <img src="images/fish_logo.png" style="width: 30px; margin-right: 10px; vertical-align: middle;" />心情漂流瓶.
        </div>
        <div class="search-container"><input type="text" class="search-input light-search" placeholder="🔍 搜尋文章、看板..." /></div>
        
        <div class="nav-actions">
          <button id="login-trigger" class="btn-login">註冊 / 登入</button>
          
          <div id="user-profile" class="user-menu-wrapper" style="display: none;">
            <div class="user-info-trigger" id="user-menu-btn">
              <img id="user-avatar" src="images/fish_logo.png" alt="頭像" class="avatar-img" />
              <span id="user-name" class="user-name-text"></span>
              <span class="menu-arrow">▼</span>
            </div>

            <div class="user-dropdown-menu" id="user-dropdown">
              <div class="menu-item" onclick="alert('開啟個人資料修改')">👤 個人資料</div>
              <div class="menu-item" onclick="alert('顯示我收藏的文章')">⭐ 收藏文章</div>
              <div class="menu-item" onclick="alert('顯示我發過的內容')">📝 我的文章</div>
              <div class="menu-divider"></div>
              <div class="menu-item logout-item" id="logout-btn">🚪 退出登入</div>
            </div>

            <button id="btn-new-post" class="btn-post" style="margin-left: 10px;">✏️ 發文</button>
          </div>
        </div>
      </header>

      <div class="container light-container">
        <aside class="sidebar light-sidebar">
          <h3>熱門看板</h3>
          <ul>
            <li class="active">🔥 綜合閒聊</li>
            <li>💻 程式開發</li>
            <li>🍜 美食特搜</li>
            <li>🎮 遊戲專區</li>
          </ul>
        </aside>
        
        <main class="main-feed" id="post-container"></main>
        
        <aside class="right-panel light-right-panel">
          <h3>熱門話題</h3>
          <div class="tag-cloud"><span class="tag"># AI革命</span><span class="tag"># 心情點滴</span></div>
        </aside>
      </div>
    </div>

    <div id="post-modal" class="modal">
      <div class="modal-content light-modal" style="width: 500px; text-align: left">
        <span class="close-btn" id="close-post-modal" style="color:#666;">&times;</span>
        <h2 style="margin-top: 0; color: #0055a5; border-bottom: 2px solid #e0e0e0; padding-bottom: 10px;">撰寫漂流瓶</h2>
        <form id="new-post-form">
          <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <select id="post-board" required class="form-input light-input" style="flex: 1; margin: 0;">
              <option value="" disabled selected>選擇海域...</option>
              <option value="綜合閒聊">🔥 綜合閒聊</option>
              <option value="程式開發">💻 程式開發</option>
              <option value="美食特搜">🍜 美食特搜</option>
              <option value="遊戲專區">🎮 遊戲專區</option>
            </select>
            <select id="post-identity" required class="form-input light-input" style="flex: 1; margin: 0;">
              <option value="真實姓名">實名</option>
              <option value="匿名">偷偷說 (匿名)</option>
            </select>
          </div>
          <input type="text" id="post-title-input" placeholder="文章標題" required class="form-input light-input" />
          <textarea id="post-content-input" placeholder="請輸入內容..." required class="form-input light-input" style="height: 150px; resize: none"></textarea>
          <button type="submit" class="btn-submit">拋出漂流瓶</button>
        </form>
      </div>
    </div>

    <script type="module" src="test.js"></script>
  </body>
</html>
