<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>心情漂流瓶 - 後台管理系統</title>
    <link rel="stylesheet" href="admin.css" />

    <script>
      const token = localStorage.getItem("authToken");
      const user = JSON.parse(localStorage.getItem("currentUser") || "{}");
      if (!token || user.role !== "ADMIN") {
        alert("權限不足：您不是管理員，無法進入後台！");
        window.location.href = "test.html";
      }
    </script>
  </head>
  <body>
    <aside class="admin-sidebar" id="admin-sidebar">
      <div class="admin-logo">
        <span class="logo-icon">🐟</span>
        <h2>漂流瓶後台</h2>
      </div>
      <ul class="admin-menu">
        <li
          class="active"
          onclick="
            switchAdminTab('dashboard');
            toggleSidebarIfMobile();
          "
        >
          📊 總覽數據
        </li>
        <li
          onclick="
            switchAdminTab('users');
            toggleSidebarIfMobile();
          "
        >
          👥 管理使用者
        </li>
        <li
          onclick="
            switchAdminTab('bottles');
            toggleSidebarIfMobile();
          "
        >
          🍾 漂流瓶審核
        </li>
        <li
          onclick="
            switchAdminTab('reports');
            toggleSidebarIfMobile();
          "
        >
          ⚠️ 檢舉處理
        </li>
      </ul>
      <div class="sidebar-footer">
        <button class="btn-return" onclick="window.location.href = 'test.html'">
          🏠 返回前台
        </button>
        <button class="btn-logout" onclick="adminLogout()">🚪 登出系統</button>
      </div>
    </aside>

    <div
      id="sidebar-overlay"
      class="sidebar-overlay"
      onclick="toggleSidebar()"
    ></div>

    <main class="admin-main">
      <header class="admin-header">
        <div class="header-left">
          <button
            id="mobile-menu-btn"
            class="hamburger-btn"
            onclick="toggleSidebar()"
          >
            ☰
          </button>
          <h2 id="admin-page-title">總覽數據</h2>
        </div>
        <div class="admin-profile">
          <img src="images/fish_logo.png" alt="Admin" />
          <div class="profile-info">
            <span id="admin-name">超級管理員</span>
            <span class="role-badge">Admin</span>
          </div>
        </div>
      </header>

      <div class="admin-content" id="admin-content-area">
        <div id="section-dashboard" class="admin-section">
          <div class="stats-grid">
            <div class="stat-card">
              <div
                class="stat-icon"
                style="background: #e0f2fe; color: #0284c7"
              >
                👥
              </div>
              <div class="stat-info">
                <h3>總會員數</h3>
                <p id="stat-users">1,204</p>
              </div>
            </div>
            <div class="stat-card">
              <div
                class="stat-icon"
                style="background: #fef9c3; color: #ca8a04"
              >
                🍾
              </div>
              <div class="stat-info">
                <h3>漂流瓶總數</h3>
                <p id="stat-bottles">8,530</p>
              </div>
            </div>
            <div class="stat-card">
              <div
                class="stat-icon"
                style="background: #dcfce7; color: #16a34a"
              >
                ✨
              </div>
              <div class="stat-info">
                <h3>今日新增</h3>
                <p id="stat-today">42</p>
              </div>
            </div>
            <div class="stat-card">
              <div
                class="stat-icon"
                style="background: #fee2e2; color: #dc2626"
              >
                ⚠️
              </div>
              <div class="stat-info">
                <h3>待處理檢舉</h3>
                <p id="stat-reports">5</p>
              </div>
            </div>
          </div>
        </div>

        <div id="section-users" class="admin-section" style="display: none">
          <div class="modern-card">
            <div
              class="card-header"
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                gap: 10px;
              "
            >
              <h3>👥 使用者清單</h3>
              <input
                type="text"
                id="search-users"
                placeholder="🔍 搜尋 ID、姓名或 Email..."
                style="
                  padding: 8px 12px;
                  border: 1px solid #ccc;
                  border-radius: 6px;
                  width: 100%;
                  max-width: 300px;
                "
                oninput="filterUsers()"
              />
            </div>
            <div class="table-responsive">
              <table class="modern-table">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>姓名/暱稱</th>
                    <th>Email</th>
                    <th>註冊時間</th>
                    <th>狀態</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="admin-users-body"></tbody>
              </table>
            </div>
          </div>
        </div>

        <div id="section-bottles" class="admin-section" style="display: none">
          <div class="modern-card">
            <div
              class="card-header"
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
                gap: 10px;
              "
            >
              <h3>🍾 文章管理</h3>
              <input
                type="text"
                id="search-bottles"
                placeholder="🔍 搜尋 標題、作者或內容..."
                style="
                  padding: 8px 12px;
                  border: 1px solid #ccc;
                  border-radius: 6px;
                  width: 100%;
                  max-width: 300px;
                "
                oninput="filterBottles()"
              />
            </div>
            <div class="table-responsive">
              <table class="modern-table">
                <thead>
                  <tr>
                    <th>文章 ID</th>
                    <th>發文者</th>
                    <th>標題</th>
                    <th>分類</th>
                    <th>發布時間</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="admin-bottles-body"></tbody>
              </table>
            </div>
          </div>
        </div>

        <div id="section-reports" class="admin-section" style="display: none">
          <div class="modern-card">
            <div class="card-header">
              <h3 style="color: #ef4444">檢舉案件</h3>
            </div>
            <div class="empty-state">
              <span class="empty-icon">☕</span>
              <p>目前尚無待處理的檢舉案件，喝杯咖啡休息一下吧！</p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="admin-modal" class="admin-modal-overlay" style="display: none">
      <div class="admin-modal-content">
        <span class="close-admin-modal" onclick="closeAdminModal()"
          >&times;</span
        >
        <h3 id="modal-title">詳細資訊</h3>
        <div id="modal-body" class="modal-body-content"></div>
        <div class="modal-actions" id="modal-actions"></div>
      </div>
    </div>

    <script>
      function toggleSidebar() {
        const sidebar = document.getElementById("admin-sidebar");
        const overlay = document.getElementById("sidebar-overlay");

        if (window.innerWidth <= 1024) {
          // 📱 手機/平板模式：滑出側邊欄 + 顯示暗色遮罩
          sidebar.classList.toggle("active-sidebar");
          overlay.classList.toggle("active-overlay");
        } else {
          // 💻 電腦版模式：直接將側邊欄向左收起，主畫面會自動延伸
          sidebar.classList.toggle("collapsed");
        }
      }

      function toggleSidebarIfMobile() {
        if (window.innerWidth <= 1024) {
          document
            .getElementById("admin-sidebar")
            .classList.remove("active-sidebar");
          document
            .getElementById("sidebar-overlay")
            .classList.remove("active-overlay");
        }
      }
    </script>
    <script src="admin.js"></script>
  </body>
</html>
