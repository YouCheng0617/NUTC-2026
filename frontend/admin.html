<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>心情漂流瓶 - 後台管理系統</title>
    <link rel="stylesheet" href="admin.css" />

    <script>
      const token = localStorage.getItem("authToken");
      const user = JSON.parse(localStorage.getItem("currentUser") || "{}");

      // 完全依賴後端傳回的 role 欄位進行動態驗證
      if (!token || user.role !== "ADMIN") {
        alert("權限不足：您不是管理員，無法進入後台！");
        window.location.href = "test.html"; // 踢回首頁
      }
    </script>
  </head>
  <body>
    <aside class="admin-sidebar">
      <div class="admin-logo">
        <img src="images/fish_logo.png" alt="Logo" />
        <h2>漂流瓶後台</h2>
      </div>
     <ul class="admin-menu">
        <li class="active" onclick="switchAdminTab('dashboard')">
          📊 總覽數據
        </li>
        <li onclick="switchAdminTab('users')">👥 管理使用者</li>
        <li onclick="switchAdminTab('bottles')">🍾 漂流瓶審核</li>
        <li onclick="switchAdminTab('reports')">⚠️ 檢舉處理</li>
        
        <li onclick="window.location.href = 'test.html'" style="color: #00f2ff; font-weight: bold; border-top: 1px solid #2d334a; margin-top: 10px; padding-top: 20px;">
          🏠 返回前台論壇
        </li>
      </ul>
      <div class="admin-logout" onclick="adminLogout()">🚪 登出系統</div>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <h2 id="admin-page-title">總覽數據</h2>
        <div class="admin-profile">
          <img src="images/fish_logo.png" alt="Admin" />
          <span id="admin-name">超級管理員</span>
        </div>
      </header>

      <div class="admin-content" id="admin-content-area">
        <div id="section-dashboard" class="admin-section">
          <div class="stats-grid">
            <div class="stat-card">
              <h3>總會員數</h3>
              <p id="stat-users">1,204</p>
            </div>
            <div class="stat-card">
              <h3>漂流瓶總數</h3>
              <p id="stat-bottles">8,530</p>
            </div>
            <div class="stat-card">
              <h3>今日新增文章</h3>
              <p id="stat-today">42</p>
            </div>
            <div class="stat-card warning-card">
              <h3>待處理檢舉</h3>
              <p id="stat-reports">5</p>
            </div>
          </div>
        </div>

        <div id="section-users" class="admin-section" style="display: none">
          <div class="table-container">
            <h3 style="color: #0055a5">👥 管理使用者清單</h3>
            <table class="admin-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>姓名 / 暱稱</th>
                  <th>Email</th>
                  <th>註冊時間</th>
                  <th>狀態</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="admin-users-body"></tbody>
            </table>
          </div>
        </div>

        <div id="section-bottles" class="admin-section" style="display: none">
          <div class="table-container">
            <h3 style="color: #0055a5">🍾 漂流瓶審核 (文章管理)</h3>
            <table class="admin-table">
              <thead>
                <tr>
                  <th>文章 ID</th>
                  <th>發文者</th>
                  <th>標題</th>
                  <th>分類</th>
                  <th>發布時間</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="admin-bottles-body"></tbody>
            </table>
          </div>
        </div>

        <div id="section-reports" class="admin-section" style="display: none">
          <div class="table-container">
            <h3 style="color: #ff4d4d">⚠️ 檢舉處理清單</h3>
            <p style="color: #888">目前尚無待處理的檢舉案件。</p>
          </div>
        </div>
      </div>
    </main>

    <div id="admin-modal" class="admin-modal-overlay" style="display: none">
      <div class="admin-modal-content">
        <span class="close-admin-modal" onclick="closeAdminModal()"
          >&times;</span
        >
        <h3 id="modal-title">詳細資訊</h3>
        <div id="modal-body" class="modal-body-content"></div>
        <div class="modal-actions" id="modal-actions"></div>
      </div>
    </div>

    <script src="admin.js"></script>
  </body>
</html>
  </body>
</html>
