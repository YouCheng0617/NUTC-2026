<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>心情漂流瓶 - 我的收藏</title>
    <link rel="stylesheet" href="test.css" />
  </head>
  <body>
    <div id="forum-view">
      <header class="light-header">
        <div
          class="logo"
          onclick="window.location.href = 'test.html'"
          title="回到主頁"
        >
          <img
            src="images/fish_logo.png"
            style="width: 30px; margin-right: 10px; vertical-align: middle"
          />心情漂流瓶.
        </div>
        <div class="search-container">
          <input
            type="text"
            class="search-input light-search"
            placeholder="🔍 搜尋我收藏的文章..."
          />
        </div>

        <div class="nav-actions">
          <button id="login-trigger" class="btn-login">註冊 / 登入</button>
          <div
            id="user-profile"
            class="user-menu-wrapper"
            style="display: none"
          >
            <div class="user-info-trigger" id="user-menu-btn">
              <img
                id="user-avatar"
                src="images/fish_logo.png"
                alt="頭像"
                class="avatar-img"
              />
              <span id="user-name" class="user-name-text"></span>
              <span class="menu-arrow">▼</span>
            </div>

            <div class="user-dropdown-menu" id="user-dropdown">
              <div class="menu-item" id="open-profile">👤 個人資料</div>
              <div
                class="menu-item"
                onclick="window.location.href = 'saved.html'"
              >
                ⭐ 收藏文章
              </div>
              <div
                class="menu-item"
                onclick="window.location.href = 'post.html'"
              >
                📝 我的文章
              </div>
              <div class="menu-divider"></div>
              <div class="menu-item logout-item" id="logout-btn">
                🚪 退出登入
              </div>
            </div>
            <button
              id="btn-new-post"
              class="btn-post"
              style="margin-left: 10px"
            >
              ✏️ 發文
            </button>
          </div>
        </div>
      </header>

      <div class="container light-container">
        <main class="main-feed" id="feed-view">
          <div id="post-container"></div>
        </main>

        <main
          class="main-feed"
          id="detail-view"
          style="
            display: none;
            background: #fff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.05);
            height: fit-content;
          "
        >
          <div
            style="
              display: flex;
              align-items: center;
              gap: 12px;
              margin-bottom: 20px;
              cursor: pointer;
              color: #3397cf;
              width: fit-content;
            "
            onclick="closePostDetail()"
          >
            <span style="font-size: 1.6rem; font-weight: bold">&larr;</span>
            <img
              src="images/fish_logo.png"
              style="width: 24px; height: 24px; border-radius: 50%"
            />
            <span
              id="detail-board-tag"
              style="font-weight: bold; font-size: 1rem"
            ></span>
          </div>

          <h2
            id="detail-post-title"
            style="
              margin-top: 0;
              font-size: 1.8rem;
              font-weight: bold;
              color: #000;
              margin-bottom: 15px;
            "
          ></h2>

          <div
            style="
              display: flex;
              align-items: center;
              gap: 12px;
              margin-bottom: 20px;
            "
          >
            <img
              src="images/fish_logo.png"
              style="
                width: 44px;
                height: 44px;
                border-radius: 50%;
                background: #f0f4f8;
                padding: 4px;
              "
            />
            <div>
              <div
                id="detail-author-tag"
                style="font-weight: 500; color: #333; font-size: 1.1rem"
              ></div>
              <div style="font-size: 0.85rem; color: #999; margin-top: 4px">
                今天發布
              </div>
            </div>
          </div>

          <p
            id="detail-post-content"
            style="
              font-size: 1.15rem;
              line-height: 1.8;
              color: #111;
              white-space: pre-wrap;
              margin-bottom: 30px;
            "
          ></p>

          <div style="background: #fafafa; border-radius: 12px; padding: 20px">
            <h3
              style="
                font-size: 1.1rem;
                color: #333;
                margin-top: 0;
                margin-bottom: 15px;
              "
            >
              共 <span id="detail-comment-count">0</span> 則留言
            </h3>

            <div
              id="detail-comments-list"
              style="
                margin-bottom: 20px;
                display: flex;
                flex-direction: column;
                gap: 15px;
              "
            ></div>

            <div
              style="
                display: flex;
                gap: 12px;
                align-items: center;
                border-top: 1px solid #eaeaea;
                padding-top: 15px;
              "
            >
              <img
                src="images/fish_logo.png"
                style="width: 36px; height: 36px; border-radius: 50%"
              />
              <input
                type="text"
                id="new-comment-input"
                placeholder="留言......"
                class="form-input light-input"
                style="
                  flex: 1;
                  margin: 0;
                  border-radius: 20px;
                  padding: 12px 20px;
                  background: #ebebeb;
                  border: none;
                "
              />
              <button
                onclick="submitComment()"
                class="btn-submit"
                style="width: auto; padding: 10px 24px; border-radius: 20px"
              >
                送出
              </button>
            </div>
          </div>
        </main>

        <aside class="right-panel light-right-panel">
          <h3 id="current-board-title">⭐ 我的收藏庫</h3>
          <div class="tag-cloud">
            <span class="tag"># AI革命</span><span class="tag"># 心情點滴</span>
          </div>
        </aside>
      </div>
    </div>

    <div id="profile-modal" class="modal">
      <div
        class="modal-content light-modal"
        style="width: 400px; text-align: center"
      >
        <span class="close-btn" id="close-profile-modal">&times;</span>
        <h2 style="color: #0055a5; margin-bottom: 20px">個人資訊</h2>
        <div class="profile-detail">
          <div
            style="position: relative; display: inline-block; cursor: pointer"
            onclick="document.getElementById('change-avatar-input').click()"
          >
            <img
              id="detail-avatar"
              src="images/fish_logo.png"
              style="
                width: 100px;
                height: 100px;
                border-radius: 50%;
                border: 3px solid #4da6ff;
                margin-bottom: 15px;
                object-fit: cover;
              "
            />
            <div
              style="
                position: absolute;
                bottom: 15px;
                right: 0;
                background: #4da6ff;
                color: white;
                border-radius: 50%;
                width: 25px;
                height: 25px;
                font-size: 14px;
                line-height: 25px;
                text-align: center;
              "
            >
              📷
            </div>
          </div>
          <input
            type="file"
            id="change-avatar-input"
            accept="image/*"
            style="display: none"
          />
          <h3 id="detail-name" style="margin: 5px 0">姓名</h3>
          <p id="detail-email" style="color: #888; font-size: 0.9rem">
            email@example.com
          </p>
          <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0" />
          <div style="text-align: left; padding: 0 20px; line-height: 2">
            <div>
              <strong>🎂 生日：</strong><span id="detail-birthday">未填寫</span>
            </div>
            <div>
              <strong>🚻 性別：</strong><span id="detail-gender">未填寫</span>
            </div>
            <div>
              <strong>✨ 星座：</strong><span id="detail-zodiac">未填寫</span>
            </div>
            <div style="margin-top: 10px"><strong>📝 自我介紹：</strong></div>
            <p
              id="detail-bio"
              style="
                background: #f9fbfd;
                padding: 10px;
                border-radius: 8px;
                font-size: 0.9rem;
              "
            >
              尚未填寫自我介紹...
            </p>
          </div>
        </div>
      </div>
    </div>

    <div id="post-modal" class="modal">
      <div
        class="modal-content light-modal"
        style="width: 500px; text-align: left"
      >
        <span class="close-btn" id="close-post-modal" style="color: #666"
          >&times;</span
        >
        <h2
          style="
            margin-top: 0;
            color: #0055a5;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
          "
        >
          撰寫漂流瓶
        </h2>
        <form id="new-post-form">
          <div style="display: flex; gap: 10px; margin-bottom: 15px">
            <select
              id="post-board"
              required
              class="form-input light-input"
              style="flex: 1; margin: 0"
            >
              <select
                id="post-board"
                required
                class="form-input light-input"
                style="flex: 1; margin: 0"
              >
                <option value="" disabled selected>選擇海域...</option>
                <option value="1">🔥 綜合閒聊</option>
                <option value="2">💻 程式開發</option>
                <option value="3">🍜 美食特搜</option>
                <option value="4">🎮 遊戲專區</option>
              </select>
            </select>
            <select
              id="post-identity"
              required
              class="form-input light-input"
              style="flex: 1; margin: 0"
            >
              <option value="真實姓名">實名</option>
              <option value="匿名">偷偷說 (匿名)</option>
            </select>
          </div>
          <input
            type="text"
            id="post-title-input"
            placeholder="文章標題"
            required
            class="form-input light-input"
          />
          <textarea
            id="post-content-input"
            placeholder="請輸入內容..."
            required
            class="form-input light-input"
            style="height: 150px; resize: none"
          ></textarea>
          <button type="submit" class="btn-submit">拋出漂流瓶</button>
        </form>
      </div>
    </div>

    <script type="module" src="test.js"></script>
  </body>
</html>
