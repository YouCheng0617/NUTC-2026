<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>心情漂流瓶 - 登入與註冊</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="login-container">
      <img src="images/background.png" class="bg-img" alt="背景" />
      <img src="images/fish.png" class="fish-deco top-left" alt="魚" />
      <img
        src="images/海星一個拷貝.png"
        class="starfish-deco bottom-right"
        alt="海星"
      />
      <img
        src="images/海星一個-1拷貝.png"
        class="starfish-deco bottom-right-1"
        alt="海星一個-1"
      />
      <div class="enter-btn-container" onclick="openAuthModal()">
        <img
          src="images/fish_logo.png"
          style="width: 80px; margin-bottom: 10px"
        />
        <h2>開啟漂流瓶</h2>
        <p>點擊登入 / 註冊</p>
      </div>
    </div>

    <div id="auth-modal" class="dark-modal" style="display: none">
      <div class="dark-modal-content">
        <span class="close-btn" onclick="closeAuthModal()">&times;</span>

        <div class="tab-container">
          <div class="tab active" id="tab-login" onclick="switchTab('login')">
            登入
          </div>
          <div class="tab" id="tab-register" onclick="switchTab('register')">
            註冊
          </div>
        </div>

        <form id="login-form" class="auth-form">
          <div class="input-group">
            <label>信箱 (Email)</label>
            <input
              type="email"
              id="login-email"
              placeholder="請輸入 Email"
              required
            />
          </div>
          <div class="input-group">
            <label>密碼 (Password)</label>
            <input
              type="password"
              id="login-password"
              placeholder="請輸入密碼"
              required
            />
          </div>
          <button
            type="button"
            class="btn-submit-dark"
            onclick="processLogin()"
            style="margin-top: 20px"
          >
            登入
          </button>
        </form>

        <form id="register-form" class="auth-form" style="display: none">
          <div class="form-row">
            <div class="avatar-upload-group"></div>
            <div class="right-inputs">
              <div class="input-group">
                <label
                  >信箱 (Email) <span style="color: #ff4d4d">*</span></label
                >
                <input
                  type="email"
                  id="reg-email"
                  placeholder="將作為登入帳號"
                  required
                />
              </div>
              <div class="input-group">
                <label
                  >密碼 (Password) <span style="color: #ff4d4d">*</span></label
                >
                <input
                  type="password"
                  id="reg-password"
                  placeholder="設定密碼"
                  required
                />
              </div>
            </div>
          </div>

          <div class="input-group">
            <label>姓名 / 暱稱 <span style="color: #ff4d4d">*</span></label>
            <input
              type="text"
              id="reg-name"
              placeholder="大家怎麼稱呼你？"
              required
            />
          </div>

          <div class="form-row-multi">
            <div class="input-group">
              <label
                >生日
                <span style="font-size: 0.8rem; color: #888"
                  >(可隱藏)</span
                ></label
              >
              <input type="date" id="reg-birthday" />
            </div>
            <div class="input-group">
              <label>性別</label>
              <select id="reg-gender">
                <option value="生理男">生理男</option>
                <option value="生理女">生理女</option>
                <option value="其他">其他</option>
                <option value="秘密">秘密</option>
              </select>
            </div>
            <div class="input-group">
              <label>星座</label>
              <select id="reg-zodiac">
                <option value="" selected>不透露</option>
                <option value="牡羊座">牡羊座</option>
                <option value="金牛座">金牛座</option>
                <option value="雙子座">雙子座</option>
                <option value="巨蟹座">巨蟹座</option>
                <option value="獅子座">獅子座</option>
                <option value="處女座">處女座</option>
                <option value="天秤座">天秤座</option>
                <option value="天蠍座">天蠍座</option>
                <option value="射手座">射手座</option>
                <option value="摩羯座">摩羯座</option>
                <option value="水瓶座">水瓶座</option>
                <option value="雙魚座">雙魚座</option>
              </select>
            </div>
          </div>

          <div class="input-group">
            <label>自我介紹</label>
            <textarea
              id="reg-bio"
              placeholder="寫點什麼讓大家認識你吧..."
              rows="3"
            ></textarea>
          </div>

          <button
            type="button"
            class="btn-submit-dark"
            onclick="processRegister()"
          >
            註冊並進入
          </button>
        </form>
      </div>
    </div>

    <script>
      // ✨ 統一設定後端網址
      const API_BASE_URL = "https://scabbed-balancing-gluten.ngrok-free.dev";

      function openAuthModal() {
        document.getElementById("auth-modal").style.display = "flex";
      }
      function closeAuthModal() {
        document.getElementById("auth-modal").style.display = "none";
      }

      function switchTab(tab) {
        document.getElementById("tab-login").classList.remove("active");
        document.getElementById("tab-register").classList.remove("active");
        document.getElementById("login-form").style.display = "none";
        document.getElementById("register-form").style.display = "none";

        if (tab === "login") {
          document.getElementById("tab-login").classList.add("active");
          document.getElementById("login-form").style.display = "flex";
        } else {
          document.getElementById("tab-register").classList.add("active");
          document.getElementById("register-form").style.display = "flex";
        }
      }

      // 🌊 串接後端登入 API (你原本的程式碼)
      async function processLogin() {
        const email = document.getElementById("login-email").value;
        const password = document.getElementById("login-password").value;
        if (email.trim() === "" || password.trim() === "") {
          alert("請輸入信箱與密碼！");
          return;
        }

        try {
          const response = await fetch(`${API_BASE_URL}/auth/login`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "ngrok-skip-browser-warning": "true",
            },
            body: JSON.stringify({ email: email, password: password }),
          });

          const responseData = await response.json();
          console.log("📦 登入 API 回傳的完整包裹：", responseData);

          if (response.ok) {
            const realToken = responseData.data.result.token;
            const realUser = responseData.data.result.member;

            localStorage.setItem("authToken", realToken);

            const userToSave = {
              email: realUser.email,
              name: realUser.name,
              avatar: "images/fish_logo.png",
              birthday: realUser.birthday,
              bio: realUser.bio,
              constellation: realUser.constellation,
            };
            localStorage.setItem("currentUser", JSON.stringify(userToSave));

            alert("登入成功！");
            window.location.href = "test.html";
          } else {
            alert("登入失敗：" + (responseData.message || "帳號或密碼錯誤"));
          }
        } catch (error) {
          console.error("連線錯誤:", error);
          alert("無法連接到後端伺服器！");
        }
      }

      // 🌊 串接後端註冊 API (你原本的程式碼)
      async function processRegister() {
        const email = document.getElementById("reg-email").value;
        const password = document.getElementById("reg-password").value;
        const name = document.getElementById("reg-name").value;

        if (
          email.trim() === "" ||
          name.trim() === "" ||
          password.trim() === ""
        ) {
          alert("信箱、姓名和密碼是必填的喔！");
          return;
        }

        const birthdayRaw = document.getElementById("reg-birthday").value;
        const finalBirthday = birthdayRaw
          ? new Date(birthdayRaw).toISOString()
          : new Date("2000-01-01").toISOString();

        const userData = {
          email: email,
          password: password,
          name: name,
          birthday: finalBirthday,
          bio: document.getElementById("reg-bio").value || "",
          blood_type: "",
          constellation: document.getElementById("reg-zodiac").value || "",
        };

        try {
          const response = await fetch(`${API_BASE_URL}/auth/register`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "ngrok-skip-browser-warning": "true",
            },
            body: JSON.stringify(userData),
          });

          const data = await response.json();

          if (response.ok) {
            alert("註冊成功！請登入。");
            switchTab("login");
          } else {
            console.error("❌ 後端拒絕註冊：", data);
            alert("註冊失敗：" + (data.message || "資料格式錯誤或信箱已存在"));
          }
        } catch (error) {
          console.error("連線錯誤:", error);
          alert("無法連接到後端伺服器！");
        }
      }
    </script>
  </body>
</html>
