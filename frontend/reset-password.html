<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>心情漂流瓶 - 重設密碼</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="login-container">
      <img src="images/background.png" class="bg-img" alt="背景" />
      <img src="images/fish.png" class="fish-deco top-left" alt="魚" />
      <img src="images/海星一個拷貝.png" class="starfish-deco bottom-right" alt="海星" />
    </div>

    <div class="dark-modal" style="display: flex;">
      <div class="dark-modal-content" style="width: 400px;">
        <h3 style="text-align: center; color: #00f2ff; margin-top: 0; font-size: 1.5rem;">設定新密碼</h3>
        <p style="color: #a9b5c7; font-size: 0.9rem; text-align: center; margin-bottom: 20px;">
          請為您的帳號設定全新的密碼。
        </p>

        <form id="reset-form" class="auth-form">
          <div class="input-group">
            <label>新密碼 (New Password)</label>
            <input type="password" id="new-password" placeholder="請輸入新密碼" required />
          </div>
          
          <div class="input-group" style="margin-top: 10px;">
            <label>確認新密碼</label>
            <input type="password" id="confirm-password" placeholder="再次輸入新密碼" required />
          </div>

          <button type="button" class="btn-submit-dark" onclick="processResetPassword()" style="margin-top: 25px;">
            確認修改
          </button>
        </form>
      </div>
    </div>

    <script>
      const API_BASE_URL = "http://163.17.135.120";

      async function processResetPassword() {
        // 🌟 自動從網址列抓取 Token (例如：?token=abcde12345)
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
          alert("無效的連結！網址中找不到驗證碼 (Token)。");
          return;
        }

        const newPassword = document.getElementById("new-password").value;
        const confirmPassword = document.getElementById("confirm-password").value;

        if (newPassword.trim() === "") {
          alert("密碼不可為空！");
          return;
        }

        if (newPassword !== confirmPassword) {
          alert("兩次輸入的密碼不一致，請重新確認！");
          return;
        }

        try {
          const response = await fetch(`${API_BASE_URL}/auth/reset-password`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "ngrok-skip-browser-warning": "true",
            },
            // 送出 Token 與新密碼給後端
            body: JSON.stringify({ token: token, newPassword: newPassword }),
          });

          if (response.ok) {
            alert("🎉 密碼重設成功！即將為您導向登入頁面。");
            window.location.href = "login.html"; // 成功後導回登入頁
          } else {
            const data = await response.json();
            alert("重設失敗：" + (data.message || "連結已失效或過期，請重新申請"));
          }
        } catch (error) {
          console.error("連線錯誤:", error);
          alert("無法連接到後端伺服器！");
        }
      }
    </script>
  </body>
</html>
