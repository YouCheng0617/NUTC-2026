<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>重設密碼 - 心情漂流瓶</title>
    <link rel="stylesheet" href="login.css" />
    <style>
      /* 讓重設密碼的視窗置中顯示 */
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #1a1a2e; /* 深海背景色 */
        background-image: url("images/background.png");
        background-size: cover;
      }
      .reset-card {
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        padding: 40px;
        border-radius: 15px;
        width: 350px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }
    </style>
  </head>
  <body>
    <div class="reset-card">
      <div style="text-align: center; margin-bottom: 20px">
        <img src="images/fish_logo.png" style="width: 60px" />
      </div>
      <h3
        style="
          text-align: center;
          color: #00f2ff;
          margin-top: 0;
          font-size: 1.5rem;
        "
      >
        設定新密碼
      </h3>
      <p
        id="status-message"
        style="
          color: #a9b5c7;
          font-size: 0.9rem;
          text-align: center;
          margin-bottom: 25px;
        "
      >
        請為您的帳號設定全新的密碼。
      </p>

      <div class="input-group">
        <label
          style="
            color: #e0e6ed;
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
          "
          >新密碼</label
        >
        <input
          type="password"
          id="new-password"
          placeholder="請輸入新密碼"
          style="width: 100%; box-sizing: border-box; margin-bottom: 20px"
          class="form-input"
        />
      </div>

      <button
        class="btn-submit-dark"
        onclick="submitNewPassword()"
        style="width: 100%"
      >
        確認並重設
      </button>
    </div>

    <script>
      const API_BASE_URL = "http://163.17.135.120";

      // 🟢 核心魔法：從網址列抓取後端發送的 Token
      // 例如網址是 reset-password.html?token=12345abc，這段程式碼就會抓到 12345abc
      const urlParams = new URLSearchParams(window.location.search);
      const urlToken = urlParams.get("token");

      // 如果使用者不是點連結進來，而是自己亂闖入這個網頁，就擋住他
      if (!urlToken) {
        document.getElementById("status-message").innerText =
          "⚠️ 找不到驗證碼，請確認您是從信箱的連結點擊進入的。";
        document.getElementById("status-message").style.color = "#ff4d4d";
        document.querySelector(".btn-submit-dark").style.display = "none";
        document.getElementById("new-password").style.display = "none";
      }

      async function submitNewPassword() {
        const newPassword = document.getElementById("new-password").value;

        if (newPassword.trim() === "") {
          alert("密碼不可為空！");
          return;
        }

        try {
          const response = await fetch(`${API_BASE_URL}/auth/reset-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token: urlToken, newPassword: newPassword }),
          });

          if (response.ok) {
            alert("🎉 密碼重設成功！請使用新密碼重新登入。");
            window.location.href = "login.html"; // 成功後直接導回登入頁
          } else {
            const data = await response.json();
            alert(
              "重設失敗：" +
                (data.message || "驗證連結可能已失效或過期，請重新發送信件。"),
            );
          }
        } catch (error) {
          console.error("連線錯誤:", error);
          alert("無法連接到後端伺服器！");
        }
      }
    </script>
  </body>
</html>
